services:
  api:
    build: .
    container_name: cloudcampus-api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env
    ports:
      - "8000:8000"
    restart: unless-stopped

  bot:
    build: .
    container_name: cloudcampus-bot
    command: python run_bot.py
    env_file:
      - .env
    restart: unless-stopped